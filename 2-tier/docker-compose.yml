version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: two-tier-app
    ports:
      - "8080:8080"
    environment:
      - DATA_SOURCE_URL=jdbc:mysql://db:3306/jb_db
      - DATA_SOURCE_USERNAME=appuser
      - DATA_SOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db

  db:
    build:
      context: ./dbtier
      dockerfile: Dockerfile
    container_name: two-tier-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
