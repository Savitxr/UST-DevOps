apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
data:
  base.cnf: |
    [mysqld]
    log_bin=mysql-bin
    binlog_format=ROW
    gtid_mode=ON
    enforce_gtid_consistency=ON
    log_replica_updates=ON
    skip_name_resolve=ON
    relay_log_recovery=ON
    default_authentication_plugin=caching_sha2_password

  01-create-repl-user.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    ordinal="${HOSTNAME##*-}"
    if [ "${ordinal}" != "0" ]; then
      echo "Replica pod ${HOSTNAME}: skipping primary-only initialization"
      exit 0
    fi

    echo "Primary pod ${HOSTNAME}: creating replication user and demo schema"
    mysql --protocol=socket -uroot -p"${MYSQL_ROOT_PASSWORD}" <<SQL
    CREATE USER IF NOT EXISTS '${MYSQL_REPLICATION_USER}'@'%' IDENTIFIED BY '${MYSQL_REPLICATION_PASSWORD}';
    GRANT REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO '${MYSQL_REPLICATION_USER}'@'%';
    FLUSH PRIVILEGES;

    CREATE DATABASE IF NOT EXISTS appdb;
    CREATE TABLE IF NOT EXISTS appdb.seed_data (
      id INT PRIMARY KEY AUTO_INCREMENT,
      message VARCHAR(255) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    INSERT INTO appdb.seed_data (message) VALUES ('seed row from primary init script');
    SQL
