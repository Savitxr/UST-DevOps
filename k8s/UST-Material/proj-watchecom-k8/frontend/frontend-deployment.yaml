apiVersion: v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels: 
    app: frontenddeployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      name: frontend
      labels:
        app: frontend
    spec:
      coimntainers:
      - name: frontend-containers
        image: cazzzzz/watches-ecom-frontend:latest
        ports:
          containerPort: 3000

