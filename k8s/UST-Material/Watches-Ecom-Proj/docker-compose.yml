services:
  frontend:
    container_name: watch-frontend
    build: ./frontend
    ports:
      - "80:3000"
    networks:
      - frontend-network
    depends_on:
      - api-gateway
    restart: unless-stopped

  api-gateway:
    container_name: api-gateway
    build: ./backend/api-gateway
    environment:
      - PORT=8080
      - REGISTRY_URL=http://registry-service:8761
      - LOGGING_URL=http://logging-service:9000/logs
    ports:
      - "8080:8080"
    networks:
      - frontend-network
      - backend-network
    depends_on:
      - registry-service
      - logging-service
    restart: unless-stopped

  registry-service:
    container_name: registry-service
    build: ./backend/registry-service
    environment:
      - PORT=8761
      - REGISTRY_TTL_MS=90000
    ports:
      - "8761:8761"
    networks:
      - backend-network
    restart: unless-stopped

  user-service:
    container_name: user-service
    build: ./backend/services/user-service
    environment:
      - SERVICE_NAME=user-service
      - PORT=8081
      - REGISTRY_URL=http://registry-service:8761
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DB_SCHEMA=users
      - JWT_SECRET=${JWT_SECRET}
      - LOGGING_URL=http://logging-service:9000/logs
    ports:
      - "8081:8081"
    networks:
      - backend-network
    depends_on:
      - registry-service
      - postgres
      - logging-service
    restart: unless-stopped

  product-service:
    container_name: product-service
    build: ./backend/services/product-service
    environment:
      - SERVICE_NAME=product-service
      - PORT=8082
      - REGISTRY_URL=http://registry-service:8761
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DB_SCHEMA=products
      - LOGGING_URL=http://logging-service:9000/logs
    ports:
      - "8082:8082"
    networks:
      - backend-network
    depends_on:
      - registry-service
      - postgres
      - logging-service
    restart: unless-stopped

  cart-service:
    container_name: cart-service
    build: ./backend/services/cart-service
    environment:
      - SERVICE_NAME=cart-service
      - PORT=8083
      - REGISTRY_URL=http://registry-service:8761
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DB_SCHEMA=cart
      - LOGGING_URL=http://logging-service:9000/logs
    ports:
      - "8083:8083"
    networks:
      - backend-network
    depends_on:
      - registry-service
      - postgres
      - logging-service
    restart: unless-stopped

  order-service:
    container_name: order-service
    build: ./backend/services/order-service
    environment:
      - SERVICE_NAME=order-service
      - PORT=8084
      - REGISTRY_URL=http://registry-service:8761
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DB_SCHEMA=orders
      - LOGGING_URL=http://logging-service:9000/logs
    ports:
      - "8084:8084"
    networks:
      - backend-network
    depends_on:
      - registry-service
      - postgres
      - logging-service
    restart: unless-stopped

  review-service:
    container_name: review-service
    build: ./backend/services/review-service
    environment:
      - SERVICE_NAME=review-service
      - PORT=8085
      - REGISTRY_URL=http://registry-service:8761
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DB_SCHEMA=reviews
      - LOGGING_URL=http://logging-service:9000/logs
    ports:
      - "8085:8085"
    networks:
      - backend-network
    depends_on:
      - registry-service
      - postgres
      - logging-service
    restart: unless-stopped

  postgres:
    container_name: watch-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - backend-network
      - database-network
    restart: unless-stopped

  logging-service:
    container_name: logging-service
    build: ./backend/logging-service
    environment:
      - PORT=9000
    ports:
      - "9000:9000"
    networks:
      - backend-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  frontend-network:
    name: frontend-network
  backend-network:
    name: backend-network
  database-network:
    name: database-network
