apiVersion: apps/v1
kind: Deployment
metadata:
  name: 2-tier-deployment
  labels:
    app: 2-tier-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 2-tier-app-pod
  template:
    metadata:
      name: 2-tier-app-pod
      labels:
        app: 2-tier-app-pod
    spec:
      containers:
        - name: 2tierappcont
          image: savitxr/2-tier-app:1
          ports:
            - containerPort: 8080
          env:
          - name: DATA_SOURCE_URL
            value: "jdbc:mysql://db-svc:3306/jb_db"
          - name: DATA_SOURCE_USERNAME
            value: "appuser"
          - name: DATA_SOURCE_PASSWORD
            value: "password"
          - name: SPRING_JPA_HIBERNATE_DDL_AUTO
            value: "update"
          volumeMounts:
            - mountPath: /cache
              name: scratch-space
        - name: nginx-cont
          image: nginx
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: /cache
              name: scratch-space
        - name: busy-cont1
          image: busybox
          command: ["sh","-c","while true; do echo 'Hello noob'; sleep 600; done"]
          volumeMounts:
            - mountPath: /afridimygoat
              name: scratch-space
      volumes:
        - name: scratch-space
          emptyDir: {}
